{{- range $name, $config := .Values.backends }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    app: {{ $name }}
spec:
  replicas: {{ $config.replicas }}
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      labels:
        app: {{ $name }}
    spec:
      {{- if eq $name "ms-watchdog" }}
      serviceAccountName: watchdog-sa
      {{- end }}
      containers:
      - name: {{ $name }}
        image: "{{ $.Values.global.image.registry | default "" }}{{ if $.Values.global.image.registry }}/{{ end }}{{ $config.imageName }}:{{ $.Values.global.image.tag }}"
        imagePullPolicy: {{ $.Values.global.image.pullPolicy }}
        ports:
        - containerPort: {{ $config.port }}
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: {{ $.Release.Name }}-secrets
              key: database-url
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ $.Release.Name }}-secrets
              key: jwt-secret
        {{- if eq $name "ms-mantencion" }}
        - name: SITRACK_URL
          value: {{ $config.sitrackUrl | quote }}
        - name: SITRACK_USER
          valueFrom:
            secretKeyRef:
              name: {{ $.Release.Name }}-secrets
              key: sitrack-user
        - name: SITRACK_PASS
          valueFrom:
            secretKeyRef:
              name: {{ $.Release.Name }}-secrets
              key: sitrack-pass
        {{- end }}
        {{- if not (eq $name "ms-middleware" "ms-watchdog") }}
        - name: TRUSTED_GATEWAY
          value: {{ eq $name "ms-administracion" | ternary "false" "true" | quote }}
        {{- end }}
        # Liveness Probe: Reinicia el contenedor si se congela
        livenessProbe:
          httpGet:
            path: {{ $config.healthPath }}
            port: {{ $config.port }}
          initialDelaySeconds: 30
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 3
        # Readiness Probe: Controla cuándo el Pod recibe tráfico (después de inicializar DB, etc.)
        readinessProbe:
          httpGet:
            path: {{ $config.healthPath }}
            port: {{ $config.port }}
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
          {{- toYaml $config.resources | nindent 10 }}
---
{{- end }}
